services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bandbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bandbot}
      POSTGRES_DB: bandbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bandbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      network: host
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgres://bandbot:${POSTGRES_PASSWORD:-bandbot}@db:5432/bandbot?sslmode=disable

volumes:
  pgdata:

